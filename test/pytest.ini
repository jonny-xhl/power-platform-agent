[pytest]
# pytest配置文件
# 控制测试发现、标记、覆盖率报告格式

# 测试发现模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试路径
testpaths = .

# 标记定义
markers =
    unit: 单元测试（快速，无外部依赖）
    integration: 集成测试（需要外部服务）
    slow: 慢速测试
    requires_auth: 需要认证的测试
    requires_dataverse: 需要真实Dataverse实例的测试

# 最小Python版本
minversion = 7.0

# 命令行选项
addopts =
    # 详细输出
    -v
    # 显示局部变量（失败时）
    --showlocals
    # 显示测试持续时间
    --durations=10
    # 严格标记模式
    --strict-markers
    # 跳过慢速测试（默认）
    -m "not slow"
    # 覆盖率配置
    --cov=framework
    --cov-report=term-missing
    --cov-report=html:test/reports/coverage
    --cov-report=xml:test/reports/coverage.xml
    # 覆盖率阈值
    --cov-fail-under=70
    # HTML报告
    --html=test/reports/html/report.html
    --self-contained-html

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率配置
[coverage:run]
source = framework
omit =
    */test*
    */__pycache__/*
    */site-packages/*
    */distutils/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = test/reports/coverage
