# Power Platform Agent 设置配置
# Agent的全局设置和行为配置

agent:
  name: "Power Platform Development Agent"
  version: "1.0.0"

  # 性能设置
  performance:
    max_concurrent_requests: 10
    request_timeout: 120
    batch_size: 100
    cache_enabled: true
    cache_ttl: 3600

  # 开发模式
  development:
    debug_mode: false
    verbose_logging: false
    mock_mode: false
    dry_run: false

  # 交互设置
  interaction:
    auto_confirm: false
    show_progress: true
    color_output: true
    table_output: true

# 编辑器集成
editor:
  # VS Code 集成
  vscode:
    enabled: true
    schema_associations:
      "**/metadata/tables/*.yaml": "metadata/_schema/table_schema.yaml"
      "**/metadata/forms/*.yaml": "metadata/_schema/form_schema.yaml"
      "**/metadata/views/*.yaml": "metadata/_schema/view_schema.yaml"
      "**/metadata/webresources/*.yaml": "metadata/_schema/webresource_schema.yaml"
      "**/metadata/ribbon/*.yaml": "metadata/_schema/ribbon_schema.yaml"
      "**/metadata/sitemap/*.yaml": "metadata/_schema/sitemap_schema.yaml"

  # Cursor 集成
  cursor:
    enabled: true
    syntax_highlighting: true

# Git 集成
git:
  enabled: true
  auto_commit: false
  commit_message_prefix: "[PP Agent]"
  ignore_patterns:
    - ".pp-local/"
    - "*.cache"
    - "*.log"

# 数据库设置
database:
  type: "sqlite"
  path: ".pp-local/state.db"
  backup_enabled: true
  backup_path: ".pp-local/backup/"

# 日志设置
logging:
  level: "INFO"  # DEBUG | INFO | WARNING | ERROR | CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  handlers:
    - type: "console"
      enabled: true
      level: "INFO"
    - type: "file"
      enabled: true
      level: "DEBUG"
      path: ".pp-local/logs/agent.log"
      max_bytes: 10485760  # 10MB
      backup_count: 5

# 通知设置
notifications:
  desktop:
    enabled: false
    sound: false

  toast:
    enabled: true
    duration: 3000

# 代理设置
proxy:
  enabled: false
  http_proxy: null
  https_proxy: null
  no_proxy: []

# TLS/SSL 设置
ssl:
  verify: true
  cert_path: null

# 限流设置
throttle:
  enabled: true
  rate_limit: 300  # 请求/分钟
  burst_size: 50
  retry_on_limit: true
  max_retries: 3
  retry_delay: 5

# 格式化设置
formatting:
  yaml:
    indent: 2
    sort_keys: false
    default_flow_style: false
    width: 120

  json:
    indent: 2
    sort_keys: true
    ensure_ascii: false

  xml:
    indent: 2
    encoding: "utf-8"

# 验证设置
validation:
  strict_mode: false
  warn_on_deprecated: true
  fail_on_warning: false

# 备份设置
backup:
  auto_backup: true
  before_apply: true
  backup_directory: ".pp-local/backup/"
  max_backups: 10
  compression: true

# 模板设置
templates:
  directory: "templates/"
  default_table_template: "basic_table.yaml"
  default_form_template: "main_form.yaml"
  default_view_template: "public_view.yaml"

# 监视设置
watch:
  enabled: false
  debounce: 1000  # 毫秒
  ignore_patterns:
    - "*.tmp"
    - "*.bak"
    - ".DS_Store"
    - "*.log"

# 部署设置
deployment:
  auto_deploy: false
  require_confirmation: true
  pre_deploy_check: true
  post_deploy_test: false

# 测试设置
testing:
  enabled: false
  test_environment: "test"
  test_cases_path: "tests/"

# 文档生成
documentation:
  auto_generate: false
  output_path: "docs/generated/"
  formats:
    - "markdown"
    - "html"

# 代码质量
code_quality:
  lint_yaml: true
  lint_json: true
  format_on_save: false
