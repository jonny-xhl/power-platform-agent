# 账户主表单元数据定义
# 本文件定义了账户实体的主表单布局

$schema: "../_schema/form_schema.yaml"

# 解决方案声明
solution:
  name: "payment_solution"
  auto_add: true  # 自动添加到解决方案

form:
  schema_name: "account_main_form"
  entity: "account"
  type: "Main"
  display_name: "账户主表单"
  description: "用于查看和编辑账户信息的主表单"
  is_default: true

  # 表单创建配置
  options:
    use_field_display_label: true
    enable_security: false
    show_image: false

# 选项卡定义
tabs:
  - name: "general"
    display_name: "常规信息"
    description: "基本账户信息"
    expand_by_default: true
    sections:
      - name: "basicInfo"
        display_name: "基本信息"
        description: "账户的基本信息"
        rows:
          - cells:
              - attribute: "accountNumber"
                width: "1"
              - attribute: "status"
                width: "1"
          - cells:
              - attribute: "accountName"
                width: "2"
          - cells:
              - attribute: "accountType"
                width: "1"
              - attribute: "openedDate"
                width: "1"

      - name: "financialInfo"
        display_name: "财务信息"
        rows:
          - cells:
              - attribute: "balance"
                width: "1"
              - attribute: "creditLimit"
                width: "1"

  - name: "details"
    display_name: "详细信息"
    visible: false
    sections:
      - name: "notesSection"
        display_name: "备注"
        rows:
          - cells:
              - attribute: "notes"
                width: "2"

  - name: "relationships"
    display_name: "关联信息"
    sections:
      - name: "contacts"
        display_name: "联系人"
        rows:
          - cells:
              - attribute: "primary_contact"
                width: "2"

# 表单级别的Web Resource引用
webresources:
  - name: "account_form_css"
    type: "css"
    path: "css/account_form.css"
    load_method: "inline"

  - name: "account_form_handler"
    type: "js"
    path: "js/account_form.js"
    functions:
      - name: "onLoad"
        event: "formOnLoad"
      - name: "onSave"
        event: "formOnSave"

# 表单事件配置
events:
  - name: "onload"
    handlers:
      - function_name: "handleFormLoad"
        library: "new_js/account_handler.js"
        enabled: true
        pass_context: true

  - name: "onsave"
    handlers:
      - function_name: "handleFormSave"
        library: "new_js/account_handler.js"
        enabled: true
        pass_context: true
