# 账户表单Web Resources配置
# 本文件定义了账户表单所需的Web Resources

$schema: "../_schema/webresource_schema.yaml"

# 解决方案声明
solution:
  unique_name: "ninebot-payment-solution"
  auto_add: true  # 自动添加到解决方案

resources:
  # CSS样式文件
  - name: "account_form"
    type: "css"
    display_name: "账户表单样式"
    description: "账户表单的自定义样式"
    source_path: "webresources/css/account_form.css"
    minify: true
    # 命名规则处理后: new_css/account_form.css

  # JavaScript处理文件
  - name: "account_handler"
    type: "js"
    display_name: "账户表单脚本"
    description: "账户表单的业务逻辑处理"
    source_path: "webresources/js/account_handler.js"
    dependencies:
      - "new_shared/underscore.js"
      - "new_shared/moment.js"
    minify: true
    source_map: false
    # 命名规则处理后: new_js/account_handler.js

  # 账户仪表板HTML
  - name: "account_dashboard"
    type: "html"
    display_name: "账户仪表板"
    description: "自定义账户仪表板页面"
    source_path: "webresources/html/account_dashboard.html"
    # 命名规则处理后: new_html/account_dashboard.html

  # 批量处理脚本
  - name: "account_batch"
    type: "js"
    display_name: "账户批量处理脚本"
    description: "处理账户批量操作的脚本"
    source_path: "webresources/js/account_batch.js"
    minify: true
    # 命名规则处理后: new_js/account_batch.js

  # 账户导出脚本
  - name: "account_export"
    type: "js"
    display_name: "账户导出脚本"
    description: "处理账户导出到Excel的脚本"
    source_path: "webresources/js/account_export.js"
    minify: true
    # 命名规则处理后: new_js/account_export.js

  # 账户邮件脚本
  - name: "account_email"
    type: "js"
    display_name: "账户邮件脚本"
    description: "处理发送账户相关邮件的脚本"
    source_path: "webresources/js/account_email.js"
    minify: true
    # 命名规则处理后: new_js/account_email.js

# 图标资源
icons:
  - name: "account_icon"
    type: "png"
    display_name: "账户图标"
    source_path: "webresources/img/account_icon.png"
    width: 32
    height: 32

  - name: "approve_icon"
    type: "svg"
    display_name: "批准图标"
    source_path: "webresources/img/approve_icon.svg"

  - name: "batch_icon"
    type: "svg"
    display_name: "批量处理图标"
    source_path: "webresources/img/batch_icon.svg"

  - name: "excel_icon"
    type: "svg"
    display_name: "Excel图标"
    source_path: "webresources/img/excel_icon.svg"

  - name: "email_icon"
    type: "svg"
    display_name: "邮件图标"
    source_path: "webresources/img/email_icon.svg"
