# 客户管理应用站点地图配置
# 本文件定义了客户管理应用的导航结构

$schema: "../_schema/sitemap_schema.yaml"

sitemap:
  schema_name: "customer_app_sitemap"
  display_name: "客户管理应用"
  description: "客户关系管理应用 - 包含账户、联系人等核心功能"
  version: "1.0.0"

  # 应用区域
  areas:
    # 客户区域
    - name: "customerArea"
      display_name: "客户区域"
      title: "客户"
      description: "管理客户账户和联系人信息"
      icon: "new_svg/customer_icon.svg"
      sequence: 0
      visible: true

      groups:
        # 客户管理组
        - name: "customerGroup"
          display_name: "客户管理"
          title: "客户"
          sequence: 0
          visible: true

          subareas:
            # 账户子区域
            - name: "account"
              display_name: "账户"
              title: "客户账户"
              type: "entity"
              entity: "account"
              default_view: "account_active_view"
              icon: "new_svg/account_icon.svg"
              sequence: 0
              visible: true

            # 联系人子区域
            - name: "contact"
              display_name: "联系人"
              title: "联系人"
              type: "entity"
              entity: "contact"
              default_view: "contact_active_view"
              icon: "new_svg/contact_icon.svg"
              sequence: 1
              visible: true

        # 客户活动组
        - name: "customerActivityGroup"
          display_name: "客户活动"
          title: "活动"
          sequence: 1
          visible: true

          subareas:
            - name: "activities"
              display_name: "活动"
              title: "所有活动"
              type: "entity"
              entity: "activitypointer"
              icon: "new_svg/activity_icon.svg"
              sequence: 0

            - name: "tasks"
              display_name: "任务"
              title: "任务"
              type: "entity"
              entity: "task"
              icon: "new_svg/task_icon.svg"
              sequence: 1

    # 仪表板区域
    - name: "dashboardArea"
      display_name: "仪表板"
      title: "仪表板"
      description: "客户数据分析和报表"
      icon: "new_svg/dashboard_icon.svg"
      sequence: 1
      visible: true

      groups:
        # 我的仪表板组
        - name: "dashboardGroup"
          display_name: "我的仪表板"
          title: "仪表板"
          sequence: 0

          subareas:
            # 账户仪表板
            - name: "accountDashboard"
              display_name: "账户仪表板"
              title: "账户概览"
              type: "dashboard"
              dashboard_id: "account_dashboard"
              url: "/webresources/new_html/account_dashboard.html"
              icon: "new_svg/account_icon.svg"
              sequence: 0
              visible: true

            # 销售仪表板
            - name: "salesDashboard"
              display_name: "销售仪表板"
              title: "销售概览"
              type: "dashboard"
              dashboard_id: "sales_dashboard"
              sequence: 1
              visible: true

    # 报表区域
    - name: "reportsArea"
      display_name: "报表"
      title: "报表"
      description: "客户相关报表"
      icon: "new_svg/reports_icon.svg"
      sequence: 2
      visible: true

      groups:
        - name: "reportsGroup"
          display_name: "客户报表"
          subareas:
            - name: "accountSummaryReport"
              display_name: "账户汇总报表"
              type: "webresource"
              url: "/webresources/new_html/account_summary_report.html"
              sequence: 0

            - name: "contactListReport"
              display_name: "联系人列表"
              type: "webresource"
              url: "/webresources/new_html/contact_list_report.html"
              sequence: 1

    # 设置区域
    - name: "settingsArea"
      display_name: "设置"
      title: "设置"
      description: "应用配置和设置"
      icon: "new_svg/settings_icon.svg"
      sequence: 3
      visible: true

      groups:
        - name: "settingsGroup"
          display_name: "应用设置"
          subareas:
            - name: "appSettings"
              display_name: "应用设置"
              type: "url"
              external_url: "/settings/app"
              sequence: 0

            - name: "userSettings"
              display_name: "用户设置"
              type: "url"
              external_url: "/settings/user"
              sequence: 1

  # 站点地图设置
  settings:
    enable_auto_create: false
    enable_data_loading: true
    show_nav_bar: true
    show_news: false
    show_help: true
    welcome_screen: false

    # 主题设置
    theme: "default"

    # 语言设置
    language: "1033"  # 英语

  # 站点地图属性
  properties:
    # 简化界面
    simplified_ui: false

    # 移动优化
    mobile_optimized: true

    # 快速访问
    quick_access:
      - "account"
      - "contact"
