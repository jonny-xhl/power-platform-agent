name: Power Platform Agent - Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-html pytest-asyncio
          pip install -e .

      - name: Verify test isolation
        run: |
          python test/scripts/verify_test_isolation.py

      - name: Run unit tests
        run: |
          bash test/scripts/run_unit_tests.sh

      - name: Run tests with coverage
        run: |
          bash test/scripts/run_with_coverage.sh

      - name: Upload coverage reports
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: test/reports/coverage/
          retention-days: 7

      - name: Upload HTML reports
        uses: actions/upload-artifact@v3
        with:
          name: html-report-py${{ matrix.python-version }}
          path: test/reports/html/
          retention-days: 7

      - name: Check coverage threshold
        run: |
          coverage report --fail-under=50 || echo "Coverage below threshold"

  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 framework/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 framework/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

  isolation-check:
    name: Test Isolation Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Verify test file isolation
        run: |
          python test/scripts/verify_test_isolation.py

      - name: Check for scattered test files
        run: |
          if find . -name "test_*.py" -not -path "./test/*" | grep -q .; then
            echo "Error: Found test files outside test/ directory"
            find . -name "test_*.py" -not -path "./test/*"
            exit 1
          fi
          echo "OK: All test files are in test/ directory"
