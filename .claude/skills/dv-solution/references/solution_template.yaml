# 解决方案元数据定义模板
# 复制此文件创建新的解决方案定义

$schema: "../_schema/solution_schema.yaml"

# ================================================================
# 解决方案基本信息
# ================================================================
solution:
  # 解决方案唯一名称（SolutionUniqueName）
  # 命名规范：使用小写字母和下划线，描述性名称
  name: "your_solution_name"

  # 解决方案显示名称（在 Dataverse 中显示）
  display_name: "您的解决方案显示名称"

  # 解决方案描述
  description: |
    详细描述解决方案的功能和用途。

  # 版本号：主版本.次版本.内部版本.修订
  # 格式：1.0.0.0
  version: "1.0.0.0"

  # 发布商引用（引用 config/publishers.yaml 中定义的发布商）
  # 默认使用 "default"，也可以自定义其他发布商
  publisher: "default"

  # 或者直接指定发布商信息（不推荐，应使用引用）
  # publisher_info:
  #   name: "YourPublisherName"
  #   display_name: "您的发布商显示名称"
  #   prefix: "your"

  # 解决方案类型
  # - None: 未指定
  # - Managed: 托管解决方案（不可修改）
  # - Unmanaged: 非托管解决方案（可修改）
  type: "Unmanaged"

# ================================================================
# 解决方案组件
# ================================================================
# 按组件类型分类组织，便于管理和同步
# 路径相对于解决方案文件的上级目录（metadata/）
components:
  # ----- 表（实体）定义 -----
  tables:
    # 示例：- "tables/your_entity.yaml"
    - ""

  # ----- 表单定义 -----
  forms:
    # 示例：- "forms/your_entity_main.yaml"
    - ""

  # ----- 视图定义 -----
  views:
    # 示例：- "views/your_entity_active.yaml"
    - ""

  # ----- 全局选项集 -----
  optionsets:
    # 示例：- "optionsets/your_global_optionset.yaml"
    - ""

  # ----- Web 资源 -----
  webresources:
    # 示例：- "webresources/js/your_script.js"
    - ""

  # ----- 插件程序集 -----
  plugins:
    # 示例：- "plugins/YourPlugin/bin/Debug/YourPlugin.dll"
    - ""

  # ----- 其他组件 -----
  # 用于指定通过 component_type 和 id 的组件
  other:
    # 示例：
    # - component_type: "ribbon"
    #   id: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
    #   name: "custom_ribbon_command"
    - component_type: ""
      id: ""
      name: ""

# ================================================================
# 同步配置
# ================================================================
sync:
  # 是否启用同步
  enabled: true

  # 同步方向
  # - local_to_remote: 本地 YAML → Dataverse（部署）
  # - remote_to_local: Dataverse → 本地 YAML（导出）
  # - bidirectional: 双向同步
  direction: "local_to_remote"

  # 冲突解决策略
  # - skip: 跳过已存在的组件（默认，安全）
  # - overwrite: 用本地定义覆盖云端
  # - merge: 尝试合并变更
  # - ask: 同步前询问用户
  on_conflict: "skip"

  # 组件同步顺序（遵循依赖关系）
  # 顺序：全局选项集 → 表 → 表单 → 视图 → Web资源 → 插件
  # 注意：全局选项集必须先于表创建，因为表字段会引用它们
  order:
    - "optionset"   # 全局选项集（独立于表，可被多个表/字段引用）
    - "table"       # 表（实体）定义
    - "form"        # 表单（依赖表的字段）
    - "view"        # 视图（依赖表的字段）
    - "webresource" # Web 资源
    - "plugin"      # 插件程序集

  # 排除同步的组件（文件路径模式匹配）
  exclude: []

  # 目标环境名称（从 environments.yaml 中选择）
  # 留空使用当前激活环境
  environment: ""

# ================================================================
# 验证配置
# ================================================================
validation:
  # 严格模式：任何验证失败都阻止同步
  strict_mode: false

  # 检查组件依赖关系
  check_dependencies: true

  # 检查命名规范（schema_name、display_name 等）
  check_naming: true

  # 跳过警告（仅显示错误）
  skip_warnings: false

# ================================================================
# 构建配置
# ================================================================
build:
  # 自动递增版本号（每次同步后自动修订版本号）
  auto_increment_version: false

  # 导出为托管解决方案
  export_as_managed: false

  # 导出文件输出路径
  # 留空使用默认路径：exports/solutions/{solution_name}_{version}.zip
  output_path: ""

  # 包含依赖组件（自动检测并包含所需的标准组件）
  include_dependencies: true
