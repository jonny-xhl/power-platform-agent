# 活跃记录视图模板
# 用于快速创建"活跃记录"类型的视图

view_pattern:
  name: "active_records"
  display_name: "活跃记录"
  description: "显示所有活跃状态的记录"

  # 视图配置
  config:
    entity: "new_entity"  # 需替换为实际实体名
    type: "public"
    fetch_xml: |
      <fetch version="1.0" mapping="logical">
        <entity name="new_entity">
          <attribute name="new_name" />
          <attribute name="new_status" />
          <attribute name="createdon" />
          <order attribute="new_name" descending="false" />
          <filter type="and">
            <condition attribute="new_status" operator="eq" value="2" />
            <condition attribute="statecode" operator="eq" value="0" />
          </filter>
        </entity>
      </fetch>

  # 标准视图列配置
  columns:
    - name: "new_name"
      display_name: "名称"
      width: 200

    - name: "new_status"
      display_name: "状态"
      width: 100

    - name: "createdon"
      display_name: "创建时间"
      width: 120

    - name: "ownerid"
      display_name: "所有者"
      width: 120
